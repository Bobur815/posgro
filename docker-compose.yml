name: posgro

services:
  ocr-python:
    build:
      context: ./src/server/ocr-python
    restart: unless-stopped
    networks:
      - posgro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is not set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is not set}
      POSTGRES_DB: posgro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - posgro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d posgro"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${DB_USER:?DB_USER is not set}:${DB_PASSWORD:?DB_PASSWORD is not set}@postgres:5432/posgro"
      PYTHON_OCR_URL: "http://ocr-python:8001"
      NODE_ENV: "production"
      PORT: "3001"
      RUN_MIGRATIONS: "true"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ocr-python:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - posgro-network
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        if [ "$$RUN_MIGRATIONS" = "true" ]; then
          echo "Running Prisma migrations..."
          npx prisma migrate deploy || exit 1
        fi
        echo "Starting app..."
        exec node dist/server/main.js


volumes:
  postgres_data:
    driver: local

networks:
  posgro-network:
    driver: bridge
