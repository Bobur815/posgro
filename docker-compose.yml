name: grocery_pos

services:
  ocr-python:
    build:
      context: ./src/server/ocr-python
    restart: unless-stopped
    networks:
      - grocery-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: grocery_pos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - grocery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d grocery_pos"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/grocery_pos"
      PYTHON_OCR_URL: "http://ocr-python:8001"
      NODE_ENV: "production"
      PORT: "3000"
      RUN_MIGRATIONS: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ocr-python:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - grocery-network
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        if [ "$$RUN_MIGRATIONS" = "true" ]; then
          echo "Running Prisma migrations..."
          npx prisma migrate deploy || exit 1
        fi
        echo "Starting app..."
        exec node dist/server/main.js

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - grocery-network

volumes:
  postgres_data:
    driver: local

networks:
  grocery-network:
    driver: bridge
