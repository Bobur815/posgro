name: Deploy POSGRO Backend

on:
  schedule:
    - cron: '0 18 * * *'  # 23:00 Tashkent (UTC+5)
  workflow_dispatch:  # manual trigger from GitHub Actions UI if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for context only)
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: GH_PAT
          script: |
            set -euo pipefail

            PROJECT_DIR="$HOME/posgro"
            OWNER="Bobur815"
            NAME="posgro"
            REPO_URL_AUTH="https://Bobur815:${GH_PAT}@github.com/${OWNER}/${NAME}.git"
            NGINX_SITE="pos.bobur-dev.uz"

            echo "📁 Ensure project dir"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            git config --global --add safe.directory "$PROJECT_DIR" || true

            if [ ! -d .git ]; then
              echo "🚀 Fresh clone"
              git clone --depth=1 "$REPO_URL_AUTH" .
            else
              echo "🔧 Update origin with PAT"
              git remote set-url origin "$REPO_URL_AUTH" || true

              echo "📦 Pull latest main"
              git fetch --depth=1 origin main
              git reset --hard origin/main
              git clean -fd
            fi

            echo "🔐 Write .env from secret"
            cat > .env <<'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF

            test -s .env         || { echo ".env is empty!";          exit 1; }
            grep -q 'JWT_SECRET=' .env  || { echo "JWT_SECRET missing";  exit 1; }
            grep -q 'DB_PASSWORD=' .env || { echo "DB_PASSWORD missing"; exit 1; }

            # Telegram bot runs on UZ VPS only — strip token so NestJS bot stays disabled
            sed -i '/^TELEGRAM_BOT_TOKEN=/d' .env

            echo "🌐 Deploy nginx config"
            sudo cp nginx.conf /etc/nginx/sites-available/${NGINX_SITE}
            sudo ln -sf /etc/nginx/sites-available/${NGINX_SITE} /etc/nginx/sites-enabled/${NGINX_SITE}
            sudo nginx -t
            sudo systemctl reload nginx

            echo "🐳 Docker Compose: build & up"
            export USER_ID=$(id -u)
            export GROUP_ID=$(id -g)
            docker compose build api
            docker compose up -d --no-deps api

            echo "⏳ Waiting for api to be healthy..."
            timeout 60 bash -c 'until docker compose ps api | grep -q "healthy"; do sleep 3; done' \
              && echo "✅ API is healthy" \
              || { echo "❌ API failed to become healthy"; docker compose logs -n 50 api; exit 1; }

            echo "✅ Status"
            docker compose ps
            docker compose logs -n 100 api || true
