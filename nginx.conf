# Yangi Asr — VPS host nginx config
# Deploy to: /etc/nginx/sites-available/pos.bobur-dev.uz
# Enable:    sudo ln -sf /etc/nginx/sites-available/pos.bobur-dev.uz /etc/nginx/sites-enabled/
# SSL cert:  sudo certbot --nginx -d pos.bobur-dev.uz

# Rate limiting
limit_req_zone $binary_remote_addr zone=pos_api:10m rate=10r/s;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name pos.bobur-dev.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pos.bobur-dev.uz;

    ssl_certificate     /etc/letsencrypt/live/pos.bobur-dev.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.bobur-dev.uz/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache   shared:POS_SSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Increase body size limit for receipt image uploads
    client_max_body_size 25M;

    # Root → redirect to web app
    location = / {
        return 301 /web;
    }

    # API
    location /api/ {
        limit_req zone=pos_api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Web app (React SPA served by NestJS at /web)
    location /web {
        proxy_pass        http://127.0.0.1:3001/web;
        proxy_http_version 1.1;
        proxy_set_header  Host               $host;
        proxy_set_header  X-Real-IP          $remote_addr;
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto  $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
